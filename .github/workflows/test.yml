name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Compile check
        run: python -m compileall cloudmem tests
      - name: Run tests
        run: pytest tests/ -v
      - name: Check Node installer syntax
        run: node --check bin/install.mjs